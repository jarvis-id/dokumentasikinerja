<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Riwayat Laporan - DokKiner</title>
    <!-- Library untuk PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        /* CSS LAYAR */
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: #f4f7f6; color: #333; padding-bottom: 100px; }
        .navbar { display: flex; justify-content: space-around; background: #34495e; padding: 12px 0; position: sticky; top: 0; z-index: 9999; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .navbar a { color: white; text-decoration: none; font-weight: bold; font-size: 13px; opacity: 0.7; }
        .navbar a.active { opacity: 1; border-bottom: 2px solid #00d2ff; }
        .container { max-width: 900px; margin: auto; padding: 15px; }
        .filter-card { background: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        
        /* Tombol */
        .btn-action { display: block; width: 100%; border: none; padding: 15px; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 10px; color: white; }
        .btn-print { background: #27ae60; }
        .btn-download { background: #3498db; }
        .btn-action:disabled { background: #bdc3c7; cursor: not-allowed; }
        
        .report-card-wrapper { display: flex; align-items: center; gap: 12px; background: white; margin-bottom: 10px; padding: 12px; border-radius: 8px; border: 1px solid #eee; }
        .report-card-preview { flex-grow: 1; cursor: pointer; position: relative; }
        .btn-del { position: absolute; right: 0; top: 0; background: #e74c3c; color: white; border: none; padding: 5px 10px; border-radius: 4px; font-size: 10px; cursor: pointer; }

        /* CSS CETAK/PDF */
        #print-area { display: none; }
        @media print {
            body * { visibility: hidden; }
            #print-area, #print-area * { visibility: visible; }
            #print-area { display: block !important; position: absolute; left: 0; top: 0; width: 100%; }
        }
        
        .page-container { width: 210mm; min-height: 296mm; padding: 15mm 12mm 10mm 12mm; background: white; page-break-after: always; position: relative; }
        .print-main-header { text-align: center; border-bottom: 2px solid #000; margin-bottom: 5mm; padding-bottom: 2mm; }
        .print-job-item { border: 1px solid #000; margin-bottom: 5mm; page-break-inside: avoid; }
        .print-header { background: #f2f2f2; padding: 5px 10px; font-weight: bold; font-size: 10px; border-bottom: 1px solid #000; display: flex; justify-content: space-between; }
        .print-meta-location { font-size: 8.5px; padding: 4px 10px; border-bottom: 1px solid #000; }
        .print-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; border-bottom: 1px solid #000; }
        .print-col { border-right: 1px solid #000; display: flex; flex-direction: column; align-items: center; padding: 5px 2px; }
        .print-col:last-child { border-right: none; }
        .print-img-box { width: 58mm; height: 42mm; display: flex; align-items: center; justify-content: center; overflow: hidden; background: #f9f9f9; }
        .print-img-box img { width: 100%; height: 100%; object-fit: contain; }
        .print-desc { padding: 8px 10px; font-size: 9.5px; }
        .print-footer-page { position: absolute; bottom: 10mm; left: 12mm; font-size: 9px; font-style: italic; font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="index.html">📝 Form Input</a>
    <a href="tampildata.html" class="active">📂 Riwayat Laporan</a>
</nav>

<div class="container">
    <div class="filter-card">
        <label style="font-size: 11px; font-weight: bold; display: block; margin-bottom: 5px;">FILTER TANGGAL:</label>
        <input type="date" id="f-date" onchange="updateUI()" style="width:100%; padding:10px; border:1px solid #ddd; border-radius:6px; margin-bottom: 10px;">
        <button class="btn-action btn-print" id="print-btn" onclick="triggerPrint()" disabled>🖨️ Cetak Terpilih (0)</button>
        <button class="btn-action btn-download" id="wa-btn" onclick="triggerPDF()" disabled>💾 Download File (PDF) (0)</button>
    </div>
    <div id="history-list"></div>
</div>

<div id="print-area"><div id="print-content-target"></div></div>

<script>
    function updateUI() {
        const fd = document.getElementById('f-date').value;
        let data = JSON.parse(localStorage.getItem('lapdok_history') || '[]');
        if(fd) data = data.filter(h => h.date === fd);
        data.sort((a,b) => b.id - a.id);

        const listDiv = document.getElementById('history-list');
        listDiv.innerHTML = data.map(h => `
            <div class="report-card-wrapper">
                <input type="checkbox" class="report-cb" value="${h.id}" onchange="updateBtn()" style="width:22px; height:22px;">
                <div class="report-card-preview" onclick="restoreToEditor(${h.id})">
                    <button class="btn-del" onclick="deleteItem(event, ${h.id})">Hapus</button>
                    <div style="font-weight:bold; font-size:14px; color:#2c3e50;">📅 ${h.timestamp}</div>
                    <div style="font-size:11px; color:#7f8c8d;">📦 ${h.data.length} Item Pekerjaan</div>
                </div>
            </div>`).join('');
        updateBtn();
    }

    function updateBtn() {
        const count = document.querySelectorAll('.report-cb:checked').length;
        document.getElementById('print-btn').disabled = count === 0;
        document.getElementById('wa-btn').disabled = count === 0;
        document.getElementById('print-btn').innerText = `🖨️ Cetak Terpilih (${count})`;
        document.getElementById('wa-btn').innerText = `💾 Download File (PDF) (${count})`;
    }

    function prepareContent() {
        const selectedIds = Array.from(document.querySelectorAll('.report-cb:checked')).map(cb => parseFloat(cb.value));
        const allHistory = JSON.parse(localStorage.getItem('lapdok_history') || '[]');
        const reports = allHistory.filter(h => selectedIds.includes(h.id));
        const target = document.getElementById('print-content-target');
        target.innerHTML = '';
        
        let allItems = [];
        reports.forEach(r => r.data.forEach(d => allItems.push(d)));
        allItems.sort((a, b) => new Date(a.workDate) - new Date(b.workDate));

        const itemsPerPage = 3; 
        const totalPages = Math.ceil(allItems.length / itemsPerPage);
        
        for (let i = 0; i < allItems.length; i += itemsPerPage) {
            const page = document.createElement('div');
            page.className = 'page-container';
            const chunk = allItems.slice(i, i + itemsPerPage);
            
            let html = `
                <div class="print-main-header">
                    <h1>DOKUMENTASI LAPORAN KINERJA</h1>
                    <p>Dicetak: ${new Date().toLocaleDateString('id-ID')}</p>
                </div>`;
            
            chunk.forEach((item, idx) => {
                html += `
                <div class="print-job-item">
                    <div class="print-header"><span>ITEM #${i + idx + 1}</span><span>${item.workDate}</span></div>
                    <div class="print-meta-location"><strong>LOKASI:</strong> ${item.addr}</div>
                    <div class="print-grid">
                        <div class="print-col"><div class="print-img-box">${item.p1 ? `<img src="${item.p1}">` : 'No Photo'}</div></div>
                        <div class="print-col"><div class="print-img-box">${item.p2 ? `<img src="${item.p2}">` : 'No Photo'}</div></div>
                        <div class="print-col"><div class="print-img-box">${item.p3 ? `<img src="${item.p3}">` : 'No Photo'}</div></div>
                    </div>
                    <div class="print-desc"><strong>KETERANGAN:</strong> ${item.desc}</div>
                </div>`;
            });
            html += `<div class="print-footer-page">Halaman ${Math.floor(i/itemsPerPage) + 1} dari ${totalPages}</div>`;
            page.innerHTML = html;
            target.appendChild(page);
        }
    }

    function triggerPrint() { prepareContent(); setTimeout(window.print, 500); }

    async function triggerPDF() {
        const defaultName = "Laporan_Kinerja_" + new Date().toISOString().slice(0, 10);
        let fileName = prompt("Masukkan nama file PDF:", defaultName);

        if (fileName === null) return; 
        if (!fileName.toLowerCase().endsWith('.pdf')) fileName += '.pdf';

        prepareContent();
        const element = document.getElementById('print-content-target');
        const opt = {
            margin: 0,
            filename: fileName,
            image: { type: 'jpeg', quality: 0.8 },
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };

        alert("Sedang memproses PDF...");
        await html2pdf().set(opt).from(element).save();
    }

    function restoreToEditor(id) {
        const entry = JSON.parse(localStorage.getItem('lapdok_history')).find(h => h.id === id);
        localStorage.setItem('lapdok_draft', JSON.stringify(entry.data));
        localStorage.setItem('lapdok_edit_context', id);
        window.location.href = "index.html";
    }

    function deleteItem(e, id) { 
        e.stopPropagation(); 
        if(confirm("Hapus laporan?")) { 
            let h = JSON.parse(localStorage.getItem('lapdok_history')); 
            localStorage.setItem('lapdok_history', JSON.stringify(h.filter(x=>x.id!==id))); 
            updateUI(); 
        } 
    }

    window.onload = updateUI;
</script>
</body>
</html>
